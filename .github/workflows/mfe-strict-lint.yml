name: Strict MFE Lint

on:
  pull_request:

jobs:
  lint-mfe-strict:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run strict MFE rules
        run: npm run lint:mfe-strict
